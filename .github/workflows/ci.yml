name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: ./mvnw -q test

      - name: Package
        run: ./mvnw -q -DskipTests package

      - name: CLI smoke test
        run: |
          java -jar cocox-cli/target/cocox-cli-0.1.0-all.jar --help
          rm -rf /tmp/cocox-ci-smoke
          java -jar cocox-cli/target/cocox-cli-0.1.0-all.jar \
            --project analyzer-tests/src/test/resources/fixtures/minimal-maven-project \
            --scope entry-points \
            --source-set main \
            --call-graph none \
            --max-methods 1 \
            --output-dir /tmp/cocox-ci-smoke
          test -s /tmp/cocox-ci-smoke/method_contexts.jsonl
