name: CI

on:
  push:
    branches: ["main", "refactor/minimization"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: ./mvnw -q test

      - name: Package
        run: ./mvnw -q -DskipTests package

      - name: CLI smoke test
        run: |
          java -jar context4docugen-cli/target/context4docugen-cli-1.0-SNAPSHOT-all.jar --help
          java -jar context4docugen-cli/target/context4docugen-cli-1.0-SNAPSHOT-all.jar validate --project analyzer-tests/src/test/resources/fixtures/minimal-maven-project
